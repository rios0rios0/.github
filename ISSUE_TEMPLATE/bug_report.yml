name: Bug Report
description: Report a bug or unexpected behaviour
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug. Please fill in the sections below as completely as possible.
        **Do not report security vulnerabilities here.** See [SECURITY.md](https://github.com/rios0rios0/.github/blob/main/SECURITY.md) instead.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: Describe what is happening…
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps required to reproduce the bug.
      placeholder: |
        1. Run `make …`
        2. Pass input `…`
        3. Observe error `…`
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behaviour
      description: What actually happened?
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true

  - type: input
    id: language-version
    attributes:
      label: Language / Runtime Version
      description: e.g. `go version go1.22.0`, `python 3.12.2`, `node v20.11.0`
      placeholder: go version go1.22.0
    validations:
      required: false

  - type: input
    id: tool-version
    attributes:
      label: Tool / Library Version
      description: Version of the affected tool or library (e.g. from `git describe --tags`)
      placeholder: v1.2.3
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      description: Paste any relevant logs, stack traces, or error messages. This will be rendered as a code block.
      render: shell
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, links, or screenshots that might help.
    validations:
      required: false
