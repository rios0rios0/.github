name: Repo Compliance Audit

on:
  schedule:
    # Daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency:
  group: repo-compliance-audit
  cancel-in-progress: false

jobs:
  audit:
    name: Audit all rios0rios0 repos
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      # PAT with `repo` + `admin:repo_hook` scopes, exposed as GH_TOKEN so `gh api`
      # can list private repos and read security/ruleset endpoints. Falls back to
      # the default GITHUB_TOKEN if the secret is not set (cross-repo calls will fail).
      GH_TOKEN: ${{ secrets.COMPLIANCE_AUDIT_TOKEN || secrets.GITHUB_TOKEN }}
      HARDEN_OWNER: rios0rios0
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify gh CLI is available
        run: gh --version

      - name: Run compliance audit
        run: |
          python3 scripts/harden_repos.py --phase 1 --fail-on-noncompliant

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compliance-audit-${{ github.run_number }}
          path: /tmp/gh_hardening_audit_before.json
          if-no-files-found: ignore
          retention-days: 30
